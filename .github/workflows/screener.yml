name: Swing Screener

on:
  schedule:
    - cron: '30 14 * * 1-5'  # once at market open, 9:30 AM ET (14:30 UTC)
  workflow_dispatch:
    inputs:
      run_type:
        description: 'screen | portfolio | pnl | above | backtest'
        default: screen

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Restore alert cache
        uses: actions/cache@v4
        with:
          path: alerts.db
          key: alerts-db-${{ github.run_id }}
          restore-keys: alerts-db-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KV_REST_API_URL:     ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:   ${{ secrets.KV_REST_API_TOKEN }}
          RUN_TYPE:            ${{ github.event.inputs.run_type || 'screen' }}
        run: python run.py
