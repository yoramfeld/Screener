name: Swing Screener

on:
  schedule:
    - cron: '*/5 14-21 * * 1-5'  # every 5 min, 9:30 AM–4:00 PM EST (14:00–21:00 UTC)
  workflow_dispatch:           # manual trigger for testing

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Restore the dedup DB from the previous run so we don't re-alert
      - name: Restore alert cache
        uses: actions/cache@v4
        with:
          path: alerts.db
          key: alerts-db-${{ github.run_id }}          # unique key forces a save each run
          restore-keys: alerts-db-                      # restores the most recent prior cache

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py
