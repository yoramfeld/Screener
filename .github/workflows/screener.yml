name: Swing Screener

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'screen | portfolio | pnl | above | backtest | earnings | rec'
        default: screen

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Restore alert cache
        uses: actions/cache@v4
        with:
          path: alerts.db
          key: alerts-db-${{ github.run_id }}
          restore-keys: alerts-db-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve run type
        id: run_type
        run: |
          if [ -n "${{ github.event.inputs.run_type }}" ]; then
            echo "value=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "value=earnings" >> $GITHUB_OUTPUT
          else
            echo "value=screen" >> $GITHUB_OUTPUT
          fi

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KV_REST_API_URL:     ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:   ${{ secrets.KV_REST_API_TOKEN }}
          RUN_TYPE:            ${{ steps.run_type.outputs.value }}
        run: python run.py
